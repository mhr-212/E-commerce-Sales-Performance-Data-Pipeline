version: "3.9"

# ============================================================
# E-commerce Sales Pipeline — Docker Compose Stack
# Services: postgres, airflow-init, airflow-webserver, airflow-scheduler
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: ecommerce-airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "zTBbzG6_r3AsmxTDTVODCqMtFkJ0l5zS2Z3MHTVAMjo="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__WEBSERVER__SECRET_KEY: "super-secret-key-change-in-prod"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
    DATABASE_URL: postgresql://pipeline:pipeline@postgres/ecommerce_dw
    SALES_DATA_DIR: /opt/airflow/data/raw
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./etl:/opt/airflow/etl
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./sql:/opt/airflow/sql
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - pipeline-net
  restart: unless-stopped

services:

  # ----------------------------------------------------------
  # PostgreSQL: shared by Airflow metadata DB + data warehouse
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_pg.sh:/docker-entrypoint-initdb.d/init_pg.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pipeline-net

  # ----------------------------------------------------------
  # One-shot init container: creates Airflow users + DW schema
  # ----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: ecommerce-airflow-init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username airflow
          --firstname Data
          --lastname Engineer
          --role Admin
          --email admin@example.com
          --password airflow &&
        echo '✅ Airflow initialised'
      "
    restart: "no"

  # ----------------------------------------------------------
  # Airflow webserver (UI at http://localhost:8080)
  # ----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: ecommerce-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ----------------------------------------------------------
  # Airflow scheduler
  # ----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: ecommerce-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres-data:
  airflow-plugins:

networks:
  pipeline-net:
    driver: bridge
