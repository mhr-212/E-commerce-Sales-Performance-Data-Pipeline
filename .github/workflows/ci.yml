name: Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install without Airflow for faster CI (DAG tests run separately)
          pip install pandas numpy pyarrow pandera sqlalchemy psycopg2-binary \
                      faker pytest pytest-cov pytest-mock python-dotenv \
                      streamlit plotly

      - name: Run unit & integration tests
        run: |
          pytest tests/ -v \
            --ignore=tests/test_dag.py \
            --tb=short \
            --cov=etl \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check etl/ dags/ tests/ dashboard/ --select E,W,F --ignore E501

  dag-integrity:
    name: DAG Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Airflow + dependencies
        run: |
          pip install "apache-airflow[postgres]==2.9.1" \
            pandas numpy pyarrow pandera sqlalchemy psycopg2-binary \
            faker pytest pytest-mock python-dotenv
        env:
          AIRFLOW_HOME: /tmp/airflow

      - name: Initialise Airflow DB
        run: airflow db init
        env:
          AIRFLOW_HOME: /tmp/airflow

      - name: Run DAG integrity tests
        run: pytest tests/test_dag.py -v --tb=short
        env:
          AIRFLOW_HOME: /tmp/airflow
